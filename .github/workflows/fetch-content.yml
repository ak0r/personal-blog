name: Receive Vault Sync

on:
  repository_dispatch:
    types: [vault-sync]
  workflow_dispatch:

jobs:
  receive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout astro-base
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive
          fetch-depth: 0

      - name: Update content submodule
        run: |
          git -C src/content reset --hard
          git -C src/content clean -fd
          git submodule update --remote --force src/content

      - name: Commit and push if changed
        run: |
          git config user.name "vault-sync[bot]"
          git config user.email "vault-sync@users.noreply.github.com"
          git add src/content
          git commit -m "[sync] update content submodule" || exit 0
          git push
