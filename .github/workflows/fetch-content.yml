name: Sync Content

# vault-sync: dispatched by the content repo on push.
# template-sync: dispatched by the template repo on push — the template
# repo's own CI must POST a repository_dispatch with this type; see
# ARCHITECTURE.md for the workflow snippet to add there.
on:
  repository_dispatch:
    types:
      - vault-sync
      - template-sync

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Personal-Blog
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      # content/ is a git submodule (see .gitmodules) — this bumps it to
      # the latest commit on its tracked branch. Only the pointer (a
      # single commit SHA) lands in personal-blog's history, not a full
      # copy of the content tree.
      - name: Update content submodule
        run: git submodule update --remote content

      - name: Sync template
        run: bash scripts/sync-template-ci.sh
        env:
          TEMPLATE_REPO: https://github.com/ak0r/astrordinary.git
          TEMPLATE_BRANCH: main

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add template content

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Sync template and content"
          git push